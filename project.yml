name: RoutineCalendar

options:
  bundleIdPrefix: com.i3inni
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    # ── 버전/빌드 번호 단일 소스 ──
    # 여기 두 줄만 바꾸고 `xcodegen generate` 하면 앱·위젯 Info.plist까지 전부 반영된다.
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "18"

configs:
  Debug: debug
  Release: release

packages:
  KakaoOpenSDK:
    url: https://github.com/kakao/kakao-ios-sdk
    from: 2.27.3

targets:

  RoutineCalendar:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RoutineCalendar
        excludes:
          - "**/*.entitlements"
      - path: Shared
    resources:
      - path: RoutineCalendar/Assets.xcassets
      - path: "RoutineCalendar/Preview Content"
      - path: RoutineCalendar/Resources/notif_icon.png
    entitlements:
      path: RoutineCalendar/RoutineCalendar.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.i3inni.routinecalendar
        aps-environment: production
        # Universal Links: 이 도메인의 https 링크를 앱이 가로챈다.
        # ⚠️ 실제 배포 도메인이 바뀌면 여기 + 서버 AASA + API_BASE_URL 도 함께 수정.
        com.apple.developer.associated-domains:
          - applinks:routine-calendar.kodeploy.com
        # Sign in with Apple
        com.apple.developer.applesignin:
          - Default
    info:
      path: RoutineCalendar/Info.plist
      properties:
        CFBundleName: 같이해
        CFBundleDisplayName: 같이해
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # 표준 HTTPS/TLS만 사용 → 수출규정 비해당. 업로드마다 묻는 질문 제거.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: YES
        NSUserNotificationUsageDescription: 루틴 알림을 받으려면 알림 권한이 필요합니다.
        # 개발 중 로컬 서버(http://localhost:8080) 접속 허용. 운영 도메인은 HTTPS 사용.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIAppFonts:
          - ongle.ttf
        # 카카오 네이티브 앱 키 (빌드 설정에서 주입). 코드/스킴이 공유.
        KAKAO_NATIVE_APP_KEY: $(KAKAO_NATIVE_APP_KEY)
        # 서버 API 베이스 URL (Config.xcconfig 에서 주입)
        API_BASE_URL: $(API_BASE_URL)
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - routinecalendar
            CFBundleURLName: com.i3inni.routinecalendar
          - CFBundleURLSchemes:
              - kakao$(KAKAO_NATIVE_APP_KEY)
            CFBundleURLName: com.i3inni.routinecalendar.kakao
        # 카카오톡 앱으로 로그인/공유 시 필요
        LSApplicationQueriesSchemes:
          - kakaokompassauth
          - kakaolink
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.i3inni.routinecalendar
        TARGETED_DEVICE_FAMILY: "1"   # iPhone 전용 (iPad 미지원)
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "DBDJ2HDBU2"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
    # 카카오 키 등 비밀 값은 xcconfig로 주입 (KAKAO_NATIVE_APP_KEY)
    configFiles:
      Debug: Config.xcconfig
      Release: Config.xcconfig
    dependencies:
      - target: RoutineCalendarWidget
        embed: true
        codeSign: false
      - package: KakaoOpenSDK
        product: KakaoSDKCommon
      - package: KakaoOpenSDK
        product: KakaoSDKAuth
      - package: KakaoOpenSDK
        product: KakaoSDKUser

  RoutineCalendarWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RoutineCalendarWidget
        excludes:
          - "**/*.entitlements"
      - path: Shared
    resources:
      - path: RoutineCalendarWidget/Assets.xcassets
    entitlements:
      path: RoutineCalendarWidget/RoutineCalendarWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.i3inni.routinecalendar
    info:
      path: RoutineCalendarWidget/Info.plist
      properties:
        CFBundleName: 같이해
        CFBundleDisplayName: 같이해
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.i3inni.routinecalendar.widget
        TARGETED_DEVICE_FAMILY: "1"   # iPhone 전용 (앱과 일치)
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "DBDJ2HDBU2"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SKIP_INSTALL: YES
