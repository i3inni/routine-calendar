services:
  postgres:
    image: postgres:16
    container_name: routine-postgres
    environment:
      POSTGRES_DB: routine_calendar
      POSTGRES_USER: routine
      POSTGRES_PASSWORD: routine
    ports:
      - "5432:5432"
    volumes:
      - routine-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routine -d routine_calendar"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  routine-pgdata:
